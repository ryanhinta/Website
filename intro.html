<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
</head>
<body>
  <div class="loginsite">
    <center>
      <p class="teks1">LOGIN AKUN</p>
    </center>
    <center>
      <p class="teks2">Masukan Email</p>
      <input type="text" class="Email">
    </center>
    <center>
      <p class="teks3">Masukan Password</p>
      <input type="password" name="" id="" class="password">
    </center>
    <center>
      <button class="tombol"><p class="teks4">LOGIN</p></button>
    </center>
    <p"><a class="link" href="">Belum Punya Akun?</a></p>
    </div>
    <style>
      body{
        background: linear-gradient(135deg, black, silver, black);
        display: flex;
        justify-content: center; 
        align-items: center;      
        height: 100vh;            
        margin: 0;
      }
      .loginsite{
        background: linear-gradient(135deg,rgb(0, 0, 0), rgb(114, 114, 114), rgb(0, 0, 0));
        align-items: center;
        justify-content: center;
        padding: 50px;
        width: 500px;
        border-radius: 100px;
      }
      .teks1{
        font-size: 30px;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        color: white;
        text-shadow: 1px 1px 2px black, 0 0 1em rgb(255, 255, 255);
      }
      .teks2{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: white;
      }
      .teks3{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: white;
      }
      .teks4{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      }
      .tombol{
      position: relative;
      padding: 10px 20px;
      border-radius: 7px;
      border: 1px solid rgb(255, 255, 255);
      font-size: 14px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
      background: transparent;
      color: #fff;
      overflow: hidden;
      box-shadow: 0 0 0 0 transparent;
      -webkit-transition: all 0.2s ease-in;
      -moz-transition: all 0.2s ease-in;
      transition: all 0.2s ease-in;
      }
      
      .tombol:hover{
      background: rgb(100, 101, 102);
      box-shadow: 0 0 30px 5px rgba(126, 126, 126, 0.815);
      -webkit-transition: all 0.2s ease-out;
      -moz-transition: all 0.2s ease-out;
      transition: all 0.2s ease-out;
      }

      .tombol:active{
      transform: translateY(2px) translateX(1px);
      box-shadow: 0 0 0 0 black;
      }
      .link{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: white;
        justify-content: center;
        display: flex;
        text-decoration: none;
        margin-top: 10px;
      }
      .link:visited{
        color: white;
      }
      .link:hover{
        color: #ccc;
      }
      .link:active{
        color: white;
      }
    </style>
</body>
</html>
