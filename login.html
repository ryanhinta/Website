<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>
    <div class="container1">
        <p class="teks1">
            MASUKAN EMAIL
        </p>
        <input type="text">
        <p class="teks2">
            MASUKAN PASSWORD
        </p>
        <input type="password">
        <div>
            <button class="tombol">
                LOGIN
            </button>
        </div>
    </div>
    <style>
        body{
            background-color: silver;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container1{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(98, 98, 98);
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 1);
        }
        .tombol{
            width: 100px;
            margin: 20px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 4px rgba(0, 0, 0, 1);
        }
    </style>
</body>
</html>
